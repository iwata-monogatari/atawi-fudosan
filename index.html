<script>
var KARTE_API = 'https://atawi-fudosan-karte-api.hiroyukio0122.workers.dev';
var formStarted = false;
function trackEvent(name){
  if(window.fgaTrack){ window.fgaTrack(name); }
  if(window.gtag){ window.gtag('event', name); }
}
function markFormStart(){
  if(formStarted){ return; }
  formStarted = true;
  trackEvent('karte_form_start');
}
async function submitKarte(){
  markFormStart();
  var addr = document.getElementById('addr').value.trim();
  var mail = document.getElementById('mail').value.trim();
  var rel  = document.getElementById('rel').value;
  var privacy = document.getElementById('privacy').checked;
  var company = document.getElementById('company').value.trim();
  var msg = document.getElementById('applyMsg');
  var btn = document.getElementById('applyBtn');
  if(!addr || !mail || !rel){
    alert('物件の住所・メールアドレス・物件とのご関係の3項目をご入力ください。');
    return;
  }
  if(!privacy){
    alert('プライバシーポリシーへの同意をお願いします。');
    return;
  }
  btn.disabled = true; btn.textContent = '送信しています…';
  msg.style.display = 'none';
  try{
    var res = await fetch(KARTE_API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({addr: addr, mail: mail, rel: rel, company: company})
    });
    var data = await res.json();
    if(res.ok && data.ok){
      trackEvent('karte_form_submit');
      location.href = '/karte/thanks/';
      return;
    }
    throw new Error(data.error || 'send_failed');
  }catch(e){
    msg.style.display = 'block';
    msg.style.color = '#c0392b';
    msg.textContent = '送信できませんでした。お手数ですが、下のLINEまたはお電話でご連絡ください。';
    btn.disabled = false; btn.textContent = 'この内容で申し込む';
  }
}
['addr','mail','rel'].forEach(function(id){
  var el = document.getElementById(id);
  if(el){
    el.addEventListener('focus', markFormStart, {once:true});
    el.addEventListener('change', markFormStart, {once:true});
  }
});
document.addEventListener('click', function(event){
  var link = event.target.closest('a[href]');
  if(!link){ return; }
  var href = link.getAttribute('href') || '';
  if(href.indexOf('tel:') === 0){ trackEvent('phone_click'); }
  else if(href.indexOf('mailto:') === 0){ trackEvent('email_click'); }
  else if(href.indexOf('/karte/sample/') !== -1){ trackEvent('sample_view'); }
  else if(href.indexOf('/karte/cases/') !== -1){ trackEvent('case_view'); }
});
var scroll75Tracked = false;
window.addEventListener('scroll', function(){
  if(scroll75Tracked){ return; }
  var maxScroll = document.documentElement.scrollHeight - window.innerHeight;
  if(maxScroll > 0 && window.scrollY / maxScroll >= 0.75){
    scroll75Tracked = true;
    trackEvent('scroll_75');
  }
}, {passive:true});
</script>
